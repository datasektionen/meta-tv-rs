services:
  app:
    build:
      dockerfile: ./Dockerfile
    ports:
      - 8000:8000
    environment:
      - ROCKET_DATABASES={sea_orm={url="postgresql://postgres:postgres@db/metatv"}}
      - ROCKET_OIDC={issuer_url="https://sso.datasektionen.se/op",client_id="${CLIENT_ID}",client_secret="${CLIENT_SECRET}",redirect_url="http://localhost:8000/auth/oidc-callback"}
      - ROCKET_HIVE={url="https://hive.datasektionen.se/api/v1",secret="${HIVE_SECRET}"}
      - ROCKET_SECRET_KEY=2hMUcPB1UjTd2W8aZDBxoUC27R0z9c56992m3x2MTE4D
      - ROCKET_ADDRESS=0.0.0.0
      - ROCKET_PORT=8000
      - ROCKET_LIMITS={file="50MiB", data-form="51MiB"}
      - ROCKET_S3={url="${AWS_URL}", bucket="meta-tv"}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - FEED_ENTRY_DURATION=30000
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:15
    container_name: db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=metatv
    ports:
      - "5432:5432"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "sh -c 'pg_isready -d metatv -U postgres'"
      interval: 1s
      timeout: 5s
      retries: 5
      start_period: 10s
